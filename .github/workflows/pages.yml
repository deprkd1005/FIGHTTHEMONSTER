name: Deploy GitHub Pages

on:
  push:
    branches:
      - master

jobs:
  deploy:
    permissions:
      contents: read
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v4
        with:
          branch: master
          path: /
      - uses: actions/deploy-pages@v1
